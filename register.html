<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สมัครสมาชิก - Aqua Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Prompt:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1><i data-lucide="waves" class="icon-logo"></i> Aqua Monitor</h1>
      <h2>สมัครสมาชิก</h2>

      <form id="registerForm">
        <div class="form-group">
          <label for="name">ชื่อ-นามสกุล</label>
          <input type="text" id="name" required placeholder="เช่น อนาวิล เก้าเอี้ยน">
        </div>

        <div class="form-group">
          <label for="email">อีเมล</label>
          <input type="email" id="email" required placeholder="example@email.com">
        </div>

        <div class="form-group">
          <label for="password">รหัสผ่าน (อย่างน้อย 8 ตัว และมีตัวเลขอย่างน้อย 1 ตัว)</label>
          <input type="password" id="password" required minlength="8" placeholder="••••••••">
        </div>

        <div class="form-group">
          <label for="confirmPassword">ยืนยันรหัสผ่าน</label>
          <input type="password" id="confirmPassword" required minlength="8" placeholder="••••••••">
        </div>

        <div class="checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" id="acceptTerms" required>
            <span>ฉันได้อ่านและยอมรับ <a href="terms.html" target="_blank" rel="noopener">ข้อตกลงการใช้บริการและนโยบายความเป็นส่วนตัว</a></span>
          </label>
        </div>

        <div class="checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" id="publicConsent">
            <span>ฉันยินยอมให้แสดงข้อมูลฟาร์มของฉันในเครือข่ายสาธารณะแบบไม่ระบุตัวตน เพื่อประโยชน์ทางสถิติ</span>
          </label>
        </div>

        <button type="submit" id="submitBtn">สมัครสมาชิก</button>

        <p id="message" class="message"></p>
      </form>

      <p class="link-text">มีบัญชีอยู่แล้ว? <a href="login.html">เข้าสู่ระบบ</a></p>
    </div>
  </div>

  <script>lucide.createIcons();</script>
  <script>
    (function() {
      const bgAnimated = document.querySelector('.bg-animated');
      if (!bgAnimated) return;

      let ticking = false;

      function updateBackground() {
        const scrollY = window.scrollY;
        const winHeight = window.innerHeight;
        const docHeight = document.documentElement.scrollHeight - winHeight;
        const scrollPercent = docHeight > 0 ? Math.min(scrollY / docHeight, 1) : 0;

        const hueRotate = scrollPercent * 30;
        bgAnimated.style.filter = `hue-rotate(${hueRotate}deg)`;

        const translateY = scrollY * 0.1;
        bgAnimated.style.transform = `translateY(${translateY}px)`;

        ticking = false;
      }

      window.addEventListener('scroll', () => {
        if (!ticking) {
          requestAnimationFrame(updateBackground);
          ticking = true;
        }
      });
    })();
  </script>
  <script type="module" src="js/register.js"></script>
</body>
</html>
