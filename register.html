<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สมัครสมาชิก - Aqua Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Prompt:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="bubbles-container" aria-hidden="true">
    <div class="bubble" style="--size:30px; --left:5%; --delay:0s; --duration:15s;"></div>
    <div class="bubble" style="--size:52px; --left:12%; --delay:3s; --duration:15s;"></div>
    <div class="bubble" style="--size:22px; --left:18%; --delay:6s; --duration:15s;"></div>
    <div class="bubble" style="--size:45px; --left:24%; --delay:1s; --duration:15s;"></div>
    <div class="bubble" style="--size:38px; --left:30%; --delay:9s; --duration:15s;"></div>
    <div class="bubble" style="--size:27px; --left:36%; --delay:4s; --duration:15s;"></div>
    <div class="bubble" style="--size:48px; --left:42%; --delay:7s; --duration:15s;"></div>
    <div class="bubble" style="--size:33px; --left:48%; --delay:2s; --duration:15s;"></div>
    <div class="bubble" style="--size:55px; --left:54%; --delay:10s; --duration:15s;"></div>
    <div class="bubble" style="--size:25px; --left:60%; --delay:5s; --duration:15s;"></div>
    <div class="bubble" style="--size:42px; --left:66%; --delay:8s; --duration:15s;"></div>
    <div class="bubble" style="--size:30px; --left:72%; --delay:11s; --duration:15s;"></div>
    <div class="bubble" style="--size:50px; --left:78%; --delay:3s; --duration:15s;"></div>
    <div class="bubble" style="--size:28px; --left:84%; --delay:6s; --duration:15s;"></div>
    <div class="bubble" style="--size:45px; --left:90%; --delay:0s; --duration:15s;"></div>
    <div class="bubble" style="--size:35px; --left:96%; --delay:9s; --duration:15s;"></div>
    <div class="bubble" style="--size:40px; --left:15%; --delay:12s; --duration:15s;"></div>
    <div class="bubble" style="--size:32px; --left:45%; --delay:13s; --duration:15s;"></div>
    <div class="bubble" style="--size:48px; --left:70%; --delay:14s; --duration:15s;"></div>
    <div class="bubble" style="--size:26px; --left:88%; --delay:11.5s; --duration:15s;"></div>
  </div>
  <div class="aurora-bg" aria-hidden="true">
    <div class="aurora-blob aurora-blob-2"></div>
  </div>
  <div class="bg-animated"></div>
  <div class="container">
    <div class="card">
      <h1><i data-lucide="waves" class="icon-logo"></i> Aqua Monitor</h1>
      <h2>สมัครสมาชิก</h2>

      <form id="registerForm">
        <div class="form-group">
          <label for="name">ชื่อ-นามสกุล</label>
          <input type="text" id="name" required placeholder="เช่น อนาวิล เก้าเอี้ยน">
        </div>

        <div class="form-group">
          <label for="email">อีเมล</label>
          <input type="email" id="email" required placeholder="example@email.com">
        </div>

        <div class="form-group">
          <label for="password">รหัสผ่าน (อย่างน้อย 6 ตัว)</label>
          <input type="password" id="password" required minlength="6" placeholder="••••••••">
        </div>

        <button type="submit" id="submitBtn">สมัครสมาชิก</button>

        <p id="message" class="message"></p>
      </form>

      <p class="link-text">มีบัญชีอยู่แล้ว? <a href="login.html">เข้าสู่ระบบ</a></p>
    </div>
  </div>

  <script>lucide.createIcons();</script>
  <script>
    (function() {
      const bgAnimated = document.querySelector('.bg-animated');
      if (!bgAnimated) return;

      let ticking = false;

      function updateBackground() {
        const scrollY = window.scrollY;
        const winHeight = window.innerHeight;
        const docHeight = document.documentElement.scrollHeight - winHeight;
        const scrollPercent = docHeight > 0 ? Math.min(scrollY / docHeight, 1) : 0;

        const hueRotate = scrollPercent * 30;
        bgAnimated.style.filter = `hue-rotate(${hueRotate}deg)`;

        const translateY = scrollY * 0.1;
        bgAnimated.style.transform = `translateY(${translateY}px)`;

        ticking = false;
      }

      window.addEventListener('scroll', () => {
        if (!ticking) {
          requestAnimationFrame(updateBackground);
          ticking = true;
        }
      });
    })();
  </script>
  <script type="module" src="js/register.js"></script>
</body>
</html>
