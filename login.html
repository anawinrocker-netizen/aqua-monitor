<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ - Aqua Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Prompt:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="bg-animated"></div>
  <div class="container">
    <div class="card">
      <h1><i data-lucide="waves" class="icon-logo"></i> Aqua Monitor</h1>
      <h2>เข้าสู่ระบบ</h2>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">อีเมล</label>
          <input type="email" id="email" required placeholder="example@email.com">
        </div>

        <div class="form-group">
          <label for="password">รหัสผ่าน</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>

        <button type="submit" id="submitBtn">เข้าสู่ระบบ</button>

        <p id="message" class="message"></p>
      </form>

      <p class="link-text">ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิก</a></p>
    </div>
  </div>

  <script>lucide.createIcons();</script>
  <script>
    (function() {
      const bgAnimated = document.querySelector('.bg-animated');
      if (!bgAnimated) return;

      let ticking = false;

      function updateBackground() {
        const scrollY = window.scrollY;
        const winHeight = window.innerHeight;
        const docHeight = document.documentElement.scrollHeight - winHeight;
        const scrollPercent = docHeight > 0 ? Math.min(scrollY / docHeight, 1) : 0;

        const hueRotate = scrollPercent * 30;
        bgAnimated.style.filter = `hue-rotate(${hueRotate}deg)`;

        const translateY = scrollY * 0.1;
        bgAnimated.style.transform = `translateY(${translateY}px)`;

        ticking = false;
      }

      window.addEventListener('scroll', () => {
        if (!ticking) {
          requestAnimationFrame(updateBackground);
          ticking = true;
        }
      });
    })();
  </script>
  <script type="module" src="js/login.js"></script>
</body>
</html>
