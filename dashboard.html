<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Aqua Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Prompt:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body class="dashboard-body">

  <!-- Header -->
  <header class="dashboard-header">
    <div class="bubbles-container" aria-hidden="true">
      <div class="bubble" style="--size:20px; --left:8%; --delay:0s; --duration:14s;"></div>
      <div class="bubble" style="--size:32px; --left:22%; --delay:4s; --duration:14s;"></div>
      <div class="bubble" style="--size:16px; --left:38%; --delay:8s; --duration:14s;"></div>
      <div class="bubble" style="--size:26px; --left:54%; --delay:2s; --duration:14s;"></div>
      <div class="bubble" style="--size:18px; --left:70%; --delay:6s; --duration:14s;"></div>
      <div class="bubble" style="--size:24px; --left:86%; --delay:10s; --duration:14s;"></div>
    </div>
    <div class="header-content">
      <h1><i data-lucide="waves" class="icon-logo"></i> Aqua Monitor</h1>
      <div class="user-info">
        <span id="farmInfo">กำลังโหลด...</span>
        <a href="friends.html" class="btn-logout" style="text-decoration:none;">
          <i data-lucide="users" class="icon-inline"></i> เพื่อน
        </a>
        <button id="logoutBtn" class="btn-logout">
          <i data-lucide="log-out" class="icon-inline"></i> ออกจากระบบ
        </button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="dashboard-main">

    <!-- Status Cards -->
    <section class="status-grid">
      <div class="status-card animate-in">
        <div class="icon-wrapper"><i data-lucide="droplet"></i></div>
        <div class="status-label">DO ปัจจุบัน</div>
        <div class="status-value" id="currentDO">--</div>
        <div class="status-unit">mg/L</div>
      </div>

      <div class="status-card animate-in">
        <div class="icon-wrapper"><i data-lucide="thermometer"></i></div>
        <div class="status-label">อุณหภูมิ</div>
        <div class="status-value" id="currentTemp">--</div>
        <div class="status-unit">°C</div>
      </div>

      <div class="status-card animate-in">
        <div class="icon-wrapper"><i data-lucide="gauge"></i></div>
        <div class="status-label">DO Saturation</div>
        <div class="status-value" id="currentSat">--</div>
        <div class="status-unit">%</div>
      </div>

      <div class="status-card status-aerator animate-in">
        <div class="icon-wrapper"><i data-lucide="fan"></i></div>
        <div class="status-label">เครื่องตีน้ำ</div>
        <div class="status-value" id="aeratorStatus">--</div>
        <button id="toggleAerator" class="btn-toggle">เปลี่ยนสถานะ</button>
      </div>
    </section>

    <!-- Last Update -->
    <p class="last-update">
      <span class="status-dot status-good live-dot"></span>
      อัปเดตล่าสุด: <span id="lastUpdate">--</span>
    </p>

    <!-- Charts -->
    <section class="chart-section">
      <h2><i data-lucide="activity" class="icon-inline"></i> กราฟ DO ย้อนหลัง 24 ชั่วโมง</h2>
      <div class="chart-container">
        <canvas id="doChart"></canvas>
      </div>
    </section>

    <!-- Rate of Change Chart -->
    <section class="chart-section" style="margin-top: 24px;">
      <h2><i data-lucide="trending-up" class="icon-inline"></i> อัตราการเปลี่ยนแปลง DO (Rate of Change)</h2>
      <p class="chart-desc">
        <i data-lucide="trending-up" class="icon-inline"></i> เส้นบวก = DO เพิ่มขึ้น (ปลอดภัย) |
        <i data-lucide="trending-down" class="icon-inline"></i> เส้นลบ = DO ลดลง |
        <i data-lucide="alert-triangle" class="icon-inline"></i> เกินเส้นแดง (-0.5) = ระบบจะเปิดเครื่องตีน้ำอัตโนมัติ
      </p>
      <div class="chart-container">
        <canvas id="rocChart"></canvas>
      </div>
    </section>

  </main>

  <script>
    document.querySelectorAll('.animate-in').forEach((el, i) => {
      el.style.animationDelay = (i * 0.1) + 's';
    });
    lucide.createIcons();
  </script>
  <script>
    (function() {
      const bgAnimated = document.querySelector('.bg-animated');
      if (!bgAnimated) return;

      let ticking = false;

      function updateBackground() {
        const scrollY = window.scrollY;
        const winHeight = window.innerHeight;
        const docHeight = document.documentElement.scrollHeight - winHeight;
        const scrollPercent = docHeight > 0 ? Math.min(scrollY / docHeight, 1) : 0;

        const hueRotate = scrollPercent * 30;
        bgAnimated.style.filter = `hue-rotate(${hueRotate}deg)`;

        const translateY = scrollY * 0.1;
        bgAnimated.style.transform = `translateY(${translateY}px)`;

        ticking = false;
      }

      window.addEventListener('scroll', () => {
        if (!ticking) {
          requestAnimationFrame(updateBackground);
          ticking = true;
        }
      });
    })();
  </script>
  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
