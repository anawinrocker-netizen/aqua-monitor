<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เพื่อน - Aqua Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Prompt:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/friends.css">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dashboard-body">
  <div class="bubbles-container" aria-hidden="true">
    <div class="bubble" style="--size:30px; --left:5%; --delay:0s; --duration:15s;"></div>
    <div class="bubble" style="--size:52px; --left:12%; --delay:3s; --duration:15s;"></div>
    <div class="bubble" style="--size:22px; --left:18%; --delay:6s; --duration:15s;"></div>
    <div class="bubble" style="--size:45px; --left:24%; --delay:1s; --duration:15s;"></div>
    <div class="bubble" style="--size:38px; --left:30%; --delay:9s; --duration:15s;"></div>
    <div class="bubble" style="--size:27px; --left:36%; --delay:4s; --duration:15s;"></div>
    <div class="bubble" style="--size:48px; --left:42%; --delay:7s; --duration:15s;"></div>
    <div class="bubble" style="--size:33px; --left:48%; --delay:2s; --duration:15s;"></div>
    <div class="bubble" style="--size:55px; --left:54%; --delay:10s; --duration:15s;"></div>
    <div class="bubble" style="--size:25px; --left:60%; --delay:5s; --duration:15s;"></div>
    <div class="bubble" style="--size:42px; --left:66%; --delay:8s; --duration:15s;"></div>
    <div class="bubble" style="--size:30px; --left:72%; --delay:11s; --duration:15s;"></div>
    <div class="bubble" style="--size:50px; --left:78%; --delay:3s; --duration:15s;"></div>
    <div class="bubble" style="--size:28px; --left:84%; --delay:6s; --duration:15s;"></div>
    <div class="bubble" style="--size:45px; --left:90%; --delay:0s; --duration:15s;"></div>
    <div class="bubble" style="--size:35px; --left:96%; --delay:9s; --duration:15s;"></div>
    <div class="bubble" style="--size:40px; --left:15%; --delay:12s; --duration:15s;"></div>
    <div class="bubble" style="--size:32px; --left:45%; --delay:13s; --duration:15s;"></div>
    <div class="bubble" style="--size:48px; --left:70%; --delay:14s; --duration:15s;"></div>
    <div class="bubble" style="--size:26px; --left:88%; --delay:11.5s; --duration:15s;"></div>
  </div>
  <div class="aurora-bg" aria-hidden="true">
    <div class="aurora-blob aurora-blob-2"></div>
  </div>
  <div class="bg-animated"></div>

  <!-- Header -->
  <header class="dashboard-header">
    <div class="header-content">
      <h1><i data-lucide="waves" class="icon-logo"></i> Aqua Monitor</h1>
      <div class="user-info">
        <span id="farmInfo">กำลังโหลด...</span>
        <a href="dashboard.html" class="btn-logout" style="text-decoration:none;">
          <i data-lucide="layout-dashboard" class="icon-inline"></i> Dashboard
        </a>
        <button id="logoutBtn" class="btn-logout">
          <i data-lucide="log-out" class="icon-inline"></i> ออกจากระบบ
        </button>
      </div>
    </div>
  </header>

  <main class="dashboard-main">

    <!-- ค้นหาฟาร์ม -->
    <section class="search-section animate-in">
      <h2><i data-lucide="search" class="icon-inline"></i> ค้นหาฟาร์ม</h2>
      <p class="search-desc">กรอกรหัสฟาร์ม (เช่น FARM-1234) เพื่อค้นหาและเพิ่มเป็นเพื่อน</p>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="FARM-XXXX" maxlength="9">
        <button id="searchBtn">ค้นหา</button>
      </div>
      <div id="searchResult"></div>
    </section>

    <!-- แผนที่เครือข่าย -->
    <section class="network-map-section animate-in">
      <h2><i data-lucide="map" class="icon-inline"></i> แผนที่เครือข่ายเพื่อน</h2>
      <p class="search-desc">
        <span><i data-lucide="star" class="icon-inline"></i> ฟาร์มของคุณ</span>
        <span><span class="status-dot status-good"></span>ปกติ</span>
        <span><span class="status-dot status-warning"></span>เฝ้าระวัง</span>
        <span><span class="status-dot status-danger"></span>ต่ำกว่ามาตรฐาน</span>
      </p>
      <div id="friendsMap"></div>
    </section>

    <!-- รายชื่อเพื่อน -->
    <section class="friends-list-section animate-in">
      <h2>
        <i data-lucide="users" class="icon-inline"></i> เพื่อนของฉัน
        <span id="friendCount" class="count-badge">0</span>
      </h2>
      <div id="friendsList" class="friends-grid">
        <p class="no-friends">ยังไม่มีเพื่อน — ใช้ช่องค้นหาด้านบนเพื่อเพิ่ม</p>
      </div>
    </section>

  </main>

  <script>
    document.querySelectorAll('.animate-in').forEach((el, i) => {
      el.style.animationDelay = (i * 0.08) + 's';
    });
    lucide.createIcons();
  </script>
  <script>
    (function() {
      const bgAnimated = document.querySelector('.bg-animated');
      if (!bgAnimated) return;

      let ticking = false;

      function updateBackground() {
        const scrollY = window.scrollY;
        const winHeight = window.innerHeight;
        const docHeight = document.documentElement.scrollHeight - winHeight;
        const scrollPercent = docHeight > 0 ? Math.min(scrollY / docHeight, 1) : 0;

        const hueRotate = scrollPercent * 30;
        bgAnimated.style.filter = `hue-rotate(${hueRotate}deg)`;

        const translateY = scrollY * 0.1;
        bgAnimated.style.transform = `translateY(${translateY}px)`;

        ticking = false;
      }

      window.addEventListener('scroll', () => {
        if (!ticking) {
          requestAnimationFrame(updateBackground);
          ticking = true;
        }
      });
    })();
  </script>
  <script type="module" src="js/friends.js"></script>
</body>
</html>
